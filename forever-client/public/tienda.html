<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forever Bolivia | Live Store</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'forever-yellow': '#FFC600',
                        'forever-green': '#2F6432',
                    }
                }
            }
        }
    </script>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;700;800&family=Playfair+Display:ital,wght@1,900&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .serif-italic { font-family: 'Playfair Display', serif; font-style: italic; }
        [x-cloak] { display: none !important; }
        .product-card:hover { transform: translateY(-12px) scale(1.02); box-shadow: 0 40px 80px -20px rgba(0,0,0,0.15); }
    </style>
</head>
<body class="bg-gray-50 overflow-x-hidden" x-data="foreverApp()">

    <nav class="fixed top-0 w-full z-[100] bg-white/90 backdrop-blur-md px-10 py-5 flex justify-between items-center border-b border-gray-100 shadow-sm">
        
        <img src="/logo-forever.png" alt="Forever Living Bolivia" class="h-12 w-auto hover:scale-105 transition-transform">
        
        <div class="flex items-center gap-6">
            <button x-show="!authToken" @click="simularLogin()" class="bg-forever-green text-white px-6 py-2 rounded-full hover:bg-forever-yellow hover:text-black transition-all duration-300 shadow-lg text-[10px] font-bold uppercase tracking-widest">
                Iniciar Sesión FBO
            </button>
            <span x-show="authToken" class="text-forever-green font-black text-xs uppercase tracking-widest"><i class="fas fa-check-circle"></i> FBO Conectado</span>

            <button @click="showCart = true" class="relative p-2 hover:text-forever-green transition-colors">
                <i class="fas fa-shopping-bag text-2xl"></i>
                <span class="absolute -top-1 -right-1 bg-red-500 text-white w-5 h-5 rounded-full flex items-center justify-center text-[10px] font-bold shadow-md" x-text="cart.length"></span>
            </button>
        </div>
    </nav>

    <section class="h-screen bg-forever-green flex items-center px-12 md:px-24 relative overflow-hidden">
        <div class="absolute inset-0 opacity-30" style="background-image: url('https://images.unsplash.com/photo-1596040033229-a9821ebd058d?auto=format&fit=crop&q=80'); background-size: cover; background-position: center;"></div>
        <div class="absolute inset-0 bg-gradient-to-r from-forever-green via-forever-green/90 to-transparent"></div>
        
        <div class="relative z-10 max-w-3xl">
            <h2 class="serif-italic text-white text-7xl md:text-[11rem] leading-[0.8] mb-10 drop-shadow-2xl">Pura.<br>Real.</h2>
            <div class="space-y-4">
                <p class="font-black uppercase tracking-[0.5em] text-xs text-forever-yellow drop-shadow-md">De la planta, al producto, a ti</p>
                <p class="text-white/90 text-lg md:text-xl font-medium max-w-lg leading-relaxed">
                    Nuestra promesa de 6 horas: procesamos el gel puro del interior de la hoja inmediatamente para conservar su potencia natural.
                </p>
                <a href="#catalogo" class="inline-block bg-forever-yellow text-black px-12 py-5 rounded-full font-black uppercase text-xs tracking-widest mt-10 hover:bg-white transition-all shadow-2xl hover:scale-105">Explorar Catálogo</a>
            </div>
        </div>
    </section>

    <section id="catalogo" class="max-w-7xl mx-auto px-10 py-32">
        <div class="mb-16">
            <h3 class="text-4xl font-black uppercase italic text-gray-900">Catálogo Oficial</h3>
            <p class="text-gray-400 font-bold uppercase text-[10px] tracking-widest mt-2" x-text="isLoading ? 'Sincronizando con base de datos...' : 'Sincronizado con Laravel'"></p>
        </div>

        <div x-show="isLoading" class="flex justify-center items-center py-20">
            <i class="fas fa-circle-notch fa-spin text-4xl text-forever-yellow"></i>
        </div>

        <div x-show="!isLoading" class="grid grid-cols-1 md:grid-cols-3 gap-16">
            <template x-for="p in products" :key="p.id">
                <div class="product-card bg-white rounded-[3.5rem] p-10 border border-gray-100 transition-all duration-700 group relative">
                    <div class="absolute top-8 right-8 bg-forever-yellow text-black px-4 py-1.5 rounded-full text-[10px] font-black shadow-md z-10" x-text="p.cc_value + ' CC'"></div>
                    
                    <div class="h-72 bg-gray-50 rounded-[3rem] mb-10 flex items-center justify-center overflow-hidden border border-gray-100">
                        <template x-if="p.foto_persona">
                            <img :src="p.foto_persona" class="h-full object-cover group-hover:scale-110 transition-transform duration-700">
                        </template>
                        <template x-if="!p.foto_persona">
                            <i class="fas fa-leaf text-8xl text-forever-green/20 group-hover:scale-110 transition-transform duration-700"></i>
                        </template>
                    </div>

                    <div class="space-y-2">
                        <div class="flex justify-between items-center">
                            <span class="text-[10px] font-black text-gray-300 uppercase tracking-widest" x-text="'SKU #' + p.sku"></span>
                            <span class="text-[9px] font-bold px-2 py-1 rounded-md" :class="p.stock <= 0 ? 'text-red-500 bg-red-50' : 'text-forever-green bg-forever-green/10'" x-text="p.stock > 0 ? 'Stock: ' + p.stock : 'Agotado'"></span>
                        </div>
                        <h4 class="text-2xl font-bold text-gray-900 leading-tight italic" x-text="p.name"></h4>
                        
                        <div class="flex justify-between items-end pt-6 border-t border-gray-50 mt-4">
                            <div>
                                <p class="text-[9px] font-black text-gray-400 uppercase">Precio Base</p>
                                <p class="text-4xl font-black text-forever-green" x-text="'Bs. ' + p.price_bs"></p>
                            </div>
                            <button @click="addToCart(p)" class="w-16 h-16 bg-black text-white rounded-[1.5rem] flex items-center justify-center hover:bg-forever-yellow hover:text-black transition-all duration-300 shadow-xl active:scale-90" :disabled="p.stock <= 0" :class="p.stock <= 0 ? 'opacity-50 cursor-not-allowed' : ''">
                                <i class="fas fa-plus text-xl"></i>
                            </button>
                        </div>
                    </div>
                </div>
            </template>
        </div>
    </section>

    <div x-show="showCart" class="fixed inset-0 z-[150]" x-cloak>
        <div class="absolute inset-0 bg-black/20 backdrop-blur-sm" @click="showCart = false"></div>
        <div class="absolute right-0 top-0 w-full max-w-md bg-white h-screen shadow-2xl flex flex-col p-12 transition-transform duration-500 border-l border-gray-100">
            <div class="flex justify-between items-center mb-10">
                <h2 class="serif-italic text-4xl text-forever-green">Tu Pedido</h2>
                <button @click="showCart = false" class="text-gray-300 hover:text-red-500 transition-colors"><i class="fas fa-times text-2xl"></i></button>
            </div>

            <div class="flex-1 overflow-y-auto space-y-4 pr-2">
                <template x-for="(item, index) in cart" :key="index">
                    <div class="flex gap-4 items-center bg-gray-50 p-4 rounded-[2rem] border border-gray-100">
                        <div class="flex-1">
                            <p class="font-black text-[10px] uppercase text-gray-400" x-text="'SKU ' + item.sku"></p>
                            <p class="font-bold text-sm text-gray-800" x-text="item.name"></p>
                            <span class="text-forever-green font-black" x-text="'Bs. ' + item.price_bs"></span>
                        </div>
                        <span class="text-[10px] font-black text-black bg-forever-yellow px-2 py-1 rounded-md shadow-sm" x-text="item.cc_value + ' CC'"></span>
                        <button @click="cart.splice(index, 1)" class="text-red-300 hover:text-red-600 p-2 transition-colors"><i class="fas fa-trash"></i></button>
                    </div>
                </template>
            </div>

            <div class="pt-8 border-t border-gray-100 space-y-6">
                <div class="bg-gray-50 p-6 rounded-[2.5rem] space-y-4 border border-gray-100">
                    <p class="text-[9px] font-black text-gray-400 uppercase tracking-widest">Datos Fiscales</p>
                    <input type="text" x-model="factura.nit" placeholder="NIT / CI" class="w-full p-4 rounded-2xl border-none shadow-inner font-bold text-sm focus:outline-none focus:ring-2 focus:ring-forever-yellow bg-white">
                    <input type="text" x-model="factura.razon" placeholder="Nombre / Razón Social" class="w-full p-4 rounded-2xl border-none shadow-inner font-bold text-sm focus:outline-none focus:ring-2 focus:ring-forever-yellow bg-white">
                </div>
                
                <div class="flex justify-between items-end px-2">
                    <span class="font-black text-gray-400 uppercase text-[10px]">Puntaje Total</span>
                    <span class="text-3xl font-black text-forever-yellow drop-shadow-sm" x-text="totalCC"></span>
                </div>
                
                <button @click="procesarVenta()" :disabled="cart.length === 0 || isProcessing" class="w-full bg-forever-green text-white py-6 rounded-[2.5rem] font-black uppercase text-[10px] tracking-widest shadow-2xl hover:bg-black transition-all duration-300 disabled:opacity-50 flex justify-center items-center gap-2">
                    <span x-text="isProcessing ? 'Procesando Venta...' : 'Procesar Venta en Laravel 🚀'"></span>
                    <i x-show="isProcessing" class="fas fa-circle-notch fa-spin"></i>
                </button>
            </div>
        </div>
    </div>

    <script>
        const API_URL = 'http://localhost:8000/api'; 

        function foreverApp() {
            return {
                products: [],
                cart: [],
                showCart: false,
                isLoading: false,
                isProcessing: false,
                authToken: localStorage.getItem('token') || '',
                factura: { nit: '', razon: '' },

                init() {
                    if(this.authToken) {
                        this.fetchProducts();
                    }
                },

                async simularLogin() {
                    const tokenRealOPrueba = prompt("Ingresa tu Token Bearer de Sanctum (Laravel):");
                    if(tokenRealOPrueba) {
                        this.authToken = tokenRealOPrueba;
                        localStorage.setItem('token', tokenRealOPrueba);
                        this.fetchProducts();
                    }
                },

                async fetchProducts() {
                    this.isLoading = true;
                    try {
                        const response = await fetch(`${API_URL}/products`, {
                            headers: {
                                'Accept': 'application/json',
                                'Authorization': `Bearer ${this.authToken}`
                            }
                        });
                        
                        if (response.ok) {
                            this.products = await response.json();
                        } else if (response.status === 401) {
                            alert("Token expirado o inválido. Debes volver a iniciar sesión.");
                            this.authToken = '';
                            localStorage.removeItem('token');
                        }
                    } catch (error) {
                        console.error('Error conectando a Laravel:', error);
                        alert('Asegúrate de que tu servidor Laravel (php artisan serve) esté encendido.');
                    } finally {
                        this.isLoading = false;
                    }
                },

                addToCart(p) { 
                    if(p.stock > 0) {
                        this.cart.push({...p}); 
                        this.showCart = true; 
                    }
                },

                async procesarVenta() {
                    this.isProcessing = true;
                    try {
                        const payload = {
                            nit_ci: this.factura.nit,
                            razon_social: this.factura.razon,
                            items: this.cart.map(item => ({
                                sku: item.sku,
                                quantity: 1 
                            }))
                        };

                        const response = await fetch(`${API_URL}/sales`, {
                            method: 'POST',
                            headers: {
                                'Content-Type': 'application/json',
                                'Accept': 'application/json',
                                'Authorization': `Bearer ${this.authToken}`
                            },
                            body: JSON.stringify(payload)
                        });

                        const data = await response.json();

                        if (response.ok) {
                            alert(`¡Venta Exitosa! 🚀\nCC Logrados: ${data.cc_logrados}\nEl stock se ha descontado automáticamente.`);
                            this.cart = []; 
                            this.showCart = false;
                            this.factura = { nit: '', razon: '' }; // Limpiar factura
                            this.fetchProducts(); // Recargar stock real
                        } else {
                            alert(`Error: ${data.message || data.error || 'Revisa tu código en SaleController'}`);
                        }
                    } catch (error) {
                        console.error('Error enviando venta:', error);
                        alert('Hubo un problema de red. Revisa que Laravel y el CORS estén bien configurados.');
                    } finally {
                        this.isProcessing = false;
                    }
                },

                get totalCC() { 
                    return this.cart.reduce((s, i) => s + parseFloat(i.cc_value), 0).toFixed(3) + ' CC'; 
                }
            }
        }
    </script>
</body>
</html>
